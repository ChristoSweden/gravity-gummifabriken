<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0D0B09" />
    <meta name="description" content="Gravity — Proximity-based professional networking at Gummifabriken. Discover who's nearby, connect over shared interests, and grow your network." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Gravity @ Gummifabriken" />
    <meta property="og:description" content="Proximity-based professional networking. Discover who's nearby, connect over shared interests, and grow your network." />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Gravity @ Gummifabriken" />
    <meta name="twitter:description" content="Proximity-based professional networking. Discover who's nearby and connect." />
    <meta name="twitter:image" content="/icon-512.png" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Gravity @ Gummifabriken</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply dark mode by default (unless user explicitly chose light)
      var t = localStorage.getItem('gravity-theme');
      if (t !== 'light') {
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.querySelector('meta[name="theme-color"]').content = '#FAF7F2';
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(function(err) {
            console.warn('[SW] Registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
